<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles/reset.css">
    <link rel="stylesheet" href="styles/layout.css">
    <link rel="stylesheet" href="styles/contents.css">
    <title>Portifólio - Jeziel Braga</title>
</head>

<body>
    <header>
        <button id="back">Voltar</button>
    </header>

    <main>
        <!-- ********** CARDS ********** -->
        <section id="cards" class="contents">
            <figure id="contas" class="card">
                <img src="images/financ.png" alt="Caneta, Caderno e Calculadora">

                <figcaption>Contas</figcaption>
            </figure>

            <figure id="part" class="card">
                <img src="images/construc.png" alt="Em Desenvolvimento">

                <figcaption>#1 Em Breve</figcaption>
            </figure>
        </section>

        <!-- ********* CONTAS ********** -->
        <section id="contas-dst" class="contents">
            <section id="entradas">
                <div class="input-field">
                    <label for="divida">Valor da dívida: </label>
                    <input type="number" name="" id="divida" step=".01">
                </div>

                <div class="input-field">
                    <label for="renda-1">Informe a Renda 1: </label>
                    <input type="number" name="" id="renda-1" step=".01">
                </div>

                <div class="input-field">
                    <label for="renda-2">Informe a Renda 2: </label>
                    <input type="number" name="" id="renda-2" step=".01">
                </div>

                <button id="calc">Calcular</button>
            </section>

            <section id="totais">
                <p>
                    Renda 1 deve contribuir com: <span id="cont-rend-1"></span>
                </p>

                <p>
                    Renda 2 deve contribuir com: <span id="cont-rend-2"></span>
                </p>
            </section>
        </section>

        <!-- ********** ********** -->
        <section id="part-dst" class="contents">
            <h2>Em Desenvolvimento</h2>
        </section>
    </main>

    <footer></footer>

    <script src="scripts/navigation.js"></script>
    <script src="scripts/contas.js"></script>
</body>

</html>
