<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles/reset.css">
    <link rel="stylesheet" href="styles/layout.css">
    <link rel="stylesheet" href="styles/contents.css">
    <title>Portifólio - Jeziel Braga</title>
</head>

<body>
    <header>
        <button id="back">Voltar</button>
    </header>

    <main>
        <!-- ********** CARDS ********** -->
        <section id="cards" class="contents">
            <figure id="contas" class="card">
                <img src="images/financ.png" alt="Caneta, Caderno e Calculadora">

                <figcaption>Contas</figcaption>
            </figure>

            <figure id="part" class="card">
                <img src="images/construc.png" alt="Em Desenvolvimento">

                <figcaption>#1 Em Breve</figcaption>
            </figure>
        </section>

        <!-- ********* CONTAS ********** -->
        <section id="contas-dst" class="contents">
            <form action="">
                <div>
                    <label for="desc">Descrição: </label>
                    <input type="text" name="" id="desc">
                </div>

                <div>
                    <label for="valor">Valor:</label>
                    <input type="number" name="" id="valor">
                </div>

                <div id="finalidade">
                    <div>
                        <label for="entrada">Entrada:</label>
                        <input type="radio" name="finalidade" id="entrada">
                    </div>

                    <div>
                        <label for="saida">Saída:</label>
                        <input type="radio" name="finalidade" id="saida">
                    </div>
                </div>

                <button>Adicionar</button>
            </form>
        </section>

        <!-- ********** ********** -->
        <section id="part-dst" class="contents">
            <h2>Em Desenvolvimento</h2>
        </section>
    </main>

    <footer></footer>

    <script src="scripts/navigation.js"></script>
</body>

</html>
